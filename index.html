<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Футбольное Табло (Экран)</title>
    <style>
        body {
            background-color: #0b0f19;
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }
        .scoreboard {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            border: 6px solid #3b82f6;
            border-radius: 25px;
            padding: 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 95%;
            height: 90%;
            box-sizing: border-box;
            box-shadow: 0 30px 60px rgba(0,0,0,0.7);
            position: relative;
        }
        .team-section {
            width: 38%;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
        }
        .team-input {
            background: transparent;
            border: 2px dashed transparent;
            color: #e2e8f0;
            font-size: 4rem;
            font-weight: bold;
            text-transform: uppercase;
            text-align: center;
            width: 100%;
            margin-bottom: 20px;
            border-radius: 8px;
            padding: 5px;
        }
        .score {
            font-size: 14rem;
            font-weight: 900;
            color: #3b82f6;
            font-family: monospace;
            background: #020617;
            border-radius: 20px;
            padding: 10px 40px;
            min-width: 220px;
            text-align: center;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.9);
        }
        .match-info {
            width: 24%;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
        }
        .timer {
            font-size: 7.5rem;
            font-weight: bold;
            color: #ef4444;
            font-family: monospace;
            background: #020617;
            border-radius: 15px;
            padding: 10px 25px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
            margin-bottom: 25px;
        }
        .period {
            font-size: 2.2rem;
            font-weight: bold;
            color: #10b981;
            background: #064e3b;
            padding: 10px 30px;
            border-radius: 30px;
            white-space: nowrap;
            margin-bottom: 15px;
        }
        .ot-label {
            font-size: 1.8rem;
            font-weight: bold;
            color: #f59e0b;
            background: #78350f;
            padding: 5px 20px;
            border-radius: 15px;
            visibility: hidden;
            text-transform: uppercase;
        }
        /* Анимация конца тайма */
        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(2, 6, 23, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4.5rem;
            font-weight: bold;
            color: #ef4444;
            border-radius: 20px;
            opacity: 0;
            visibility: hidden;
            transition: all 0.5s ease;
            text-transform: uppercase;
            text-shadow: 0 0 20px rgba(239, 68, 68, 0.5);
            z-index: 10;
        }
        .overlay.show {
            opacity: 1;
            visibility: visible;
        }
    </style>
</head>
<body>
    <div class="scoreboard">
        <div id="endOverlay" class="overlay">Конец 1 тайма</div>

        <!-- ЛЕВАЯ КОМАНДА -->
        <div class="team-section">
            <input type="text" id="t1Input" class="team-input" value="КОМАНДА 1" oninput="broadcastNames()">
            <div id="score1" class="score">0</div>
        </div>

        <!-- ЦЕНТР -->
        <div class="match-info">
            <div id="timer" class="timer">00:00</div>
            <div id="period" class="period">1 ТАЙМ</div>
            <div id="otLabel" class="ot-label">Овертайм</div>
        </div>

        <!-- ПРАВАЯ КОМАНДА -->
        <div class="team-section">
            <input type="text" id="t2Input" class="team-input" value="КОМАНДА 2" oninput="broadcastNames()">
            <div id="score2" class="score">0</div>
        </div>
    </div>

    <script>
        window.addEventListener('storage', (e) => {
            if (e.key === 'football_data') {
                const data = JSON.parse(e.newValue);
                document.getElementById('score1').innerText = data.s1;
                document.getElementById('score2').innerText = data.s2;
                document.getElementById('timer').innerText = data.time;
                document.getElementById('period').innerText = data.p + ' ТАЙМ';
                
                // Показ плашки овертайма
                document.getElementById('otLabel').style.visibility = data.showOtLabel ? 'visible' : 'hidden';
                
                // Анимация конца тайма
                const overlay = document.getElementById('endOverlay');
                if (data.status === 'end1') {
                    overlay.innerText = "Конец 1 тайма";
                    overlay.classList.add('show');
                } else if (data.status === 'end2') {
                    overlay.innerText = "Конец матча";
                    overlay.classList.add('show');
                } else {
                    overlay.classList.remove('show');
                }
            }
            if (e.key === 'football_names') {
                const names = JSON.parse(e.newValue);
                document.getElementById('t1Input').value = names.t1;
                document.getElementById('t2Input').value = names.t2;
            }
        });
        function broadcastNames() {
            localStorage.setItem('football_names_from_tablo', JSON.stringify({
                t1: document.getElementById('t1Input').value,
                t2: document.getElementById('t2Input').value
            }));
        }
    </script>
</body>
</html>
