<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Футбольное Табло (Экран)</title>

    <style>
        body { background-color: #0b0f19; color: #ffffff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; }
        .scoreboard { background: linear-gradient(135deg, #1e293b, #0f172a); border: 4px solid #3b82f6; border-radius: 20px; padding: 40px; display: flex; justify-content: space-between; align-items: center; width: 850px; box-shadow: 0 20px 50px rgba(0,0,0,0.6); }
        .team-section { width: 38%; text-align: center; display: flex; flex-direction: column; align-items: center; }
        .team-input { background: transparent; border: 2px dashed transparent; color: #e2e8f0; font-size: 2.3rem; font-weight: bold; text-transform: uppercase; text-align: center; width: 100%; margin-bottom: 15px; border-radius: 8px; padding: 5px; transition: all 0.2s; }
        .team-input:hover, .team-input:focus { background: #1e293b; border-color: #475569; outline: none; }
        .score { font-size: 8rem; font-weight: 900; color: #3b82f6; font-family: monospace; background: #020617; border-radius: 12px; padding: 5px 25px; min-width: 120px; text-align: center; box-shadow: inset 0 0 15px rgba(0,0,0,0.8); }
        .match-info { width: 24%; text-align: center; display: flex; flex-direction: column; align-items: center; }
        .timer { font-size: 4.8rem; font-weight: bold; color: #ef4444; font-family: monospace; background: #020617; border-radius: 10px; padding: 5px 15px; box-shadow: inset 0 0 10px rgba(0,0,0,0.8); margin-bottom: 15px; }
        .period { font-size: 1.4rem; font-weight: bold; color: #10b981; background: #064e3b; padding: 6px 18px; border-radius: 20px; white-space: nowrap; }
    </style>
</head>
<body>
    <div class="scoreboard">
        <div class="team-section">
            <input type="text" id="t1Input" class="team-input" value="КОМАНДА 1" oninput="broadcastNames()">
            <div id="score1" class="score">0</div>
        </div>
        <div class="match-info">
            <div id="timer" class="timer">00:00</div>
            <div id="period" class="period">1 ТАЙМ</div>
        </div>
        <div class="team-section">
            <input type="text" id="t2Input" class="team-input" value="КОМАНДА 2" oninput="broadcastNames()">
            <div id="score2" class="score">0</div>
        </div>
    </div>
    <script>
        // Работа через локальное хранилище браузера (не блокируется Minecraft)
        window.addEventListener('storage', (e) => {
            if (e.key === 'football_data') {
                const data = JSON.parse(e.newValue);
                document.getElementById('score1').innerText = data.s1;
                document.getElementById('score2').innerText = data.s2;
                document.getElementById('timer').innerText = data.time;
                document.getElementById('period').innerText = data.p + ' ТАЙМ';
            }
            if (e.key === 'football_names') {
                const names = JSON.parse(e.newValue);
                document.getElementById('t1Input').value = names.t1;
                document.getElementById('t2Input').value = names.t2;
            }
        });
        function broadcastNames() {
            localStorage.setItem('football_names_from_tablo', JSON.stringify({
                t1: document.getElementById('t1Input').value,
                t2: document.getElementById('t2Input').value
            }));
        }
    </script>
</body>
</html>
