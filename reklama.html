<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Рекламный Щит (Синхронный)</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background-color: #0b0f19;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
        }

        /* Окно ввода ссылки по центру */
        .input-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #1e293b;
            padding: 25px;
            border-radius: 15px;
            border: 3px solid #3b82f6;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            z-index: 10;
            width: 600px;
            box-sizing: border-box;
            transition: opacity 0.4s, visibility 0.4s;
        }

        .input-container.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .input-container h3 {
            margin-top: 0;
            color: #ffffff;
            margin-bottom: 20px;
            text-align: center;
        }

        .row-group {
            display: flex;
            gap: 12px;
            width: 100%;
        }

        .input-container input {
            flex-grow: 1;
            padding: 12px;
            background: #0f172a;
            border: 1px solid #475569;
            color: white;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 0.95rem;
        }

        .input-container button {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 0 20px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            white-space: nowrap;
            transition: background 0.2s;
            font-size: 0.95rem;
        }

        .input-container button:hover {
            background: #2563eb;
        }

        /* Кнопка смены рекламы в углу */
        .reset-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(239, 68, 68, 0.3);
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            z-index: 5;
            font-size: 0.8rem;
            opacity: 0;
            transition: opacity 0.2s;
        }
        body:hover .reset-btn {
            opacity: 1;
        }
        .reset-btn:hover {
            background: rgba(239, 68, 68, 1);
        }

        /* Контейнер для дублирования GIF */
        .ad-banner {
            width: 100%;
            height: 100%;
            background-repeat: repeat-x;
            background-position: center;
            background-size: auto 100%;
            display: none;
        }

        .ad-banner.active {
            display: block;
        }
    </style>
</head>
<body>

    <!-- Окно настройки -->
    <div id="setupBox" class="input-container">
        <h3>Настройка рекламного баннера</h3>
        <div class="row-group">
            <input type="text" id="gifUrl" placeholder="Вставьте URL ссылку на .gif или картинку">
            <button onclick="startAd()">Запустить везде</button>
        </div>
    </div>

    <!-- Кнопка смены рекламы -->
    <button id="resetBtn" class="reset-btn" style="display:none;" onclick="resetAd()">⚙️ Сменить рекламу</button>

    <!-- Рекламное полотно -->
    <div id="banner" class="ad-banner"></div>

    <script>
        // Функция включения отображения (без перезаписи памяти)
        function applyAd(url) {
            const banner = document.getElementById('banner');
            const setupBox = document.getElementById('setupBox');
            const resetBtn = document.getElementById('resetBtn');

            banner.style.backgroundImage = `url('${url}')`;
            document.getElementById('gifUrl').value = url;
            
            setupBox.classList.add('hidden');
            banner.classList.add('active');
            resetBtn.style.display = 'block';
        }

        // Кнопка "Запустить" — меняет локальную память, запуская цепную реакцию
        function startAd() {
            const url = document.getElementById('gifUrl').value.trim();
            if (!url) return;

            // Запускаем у себя
            applyAd(url);

            // Записываем в общую память игры, чтобы остальные экраны это услышали
            localStorage.setItem('saved_football_ad', url);
        }

        // Кнопка сброса рекламы (также синхронная)
        function resetAd() {
            document.getElementById('setupBox').classList.remove('hidden');
            document.getElementById('banner').classList.remove('active');
            document.getElementById('resetBtn').style.display = 'none';
            
            // Удаляем из памяти, давая команду остальным очиститься
            localStorage.removeItem('saved_football_ad');
        }

        // СЛУШАТЕЛЬ СИНХРОНИЗАЦИИ: Самая главная часть
        window.addEventListener('storage', (e) => {
            if (e.key === 'saved_football_ad') {
                if (e.newValue) {
                    // Если на другом экране включили рекламу — включаем её у себя
                    applyAd(e.newValue);
                } else {
                    // Если на другом экране нажали "Сменить" — сбрасываем у себя
                    document.getElementById('setupBox').classList.remove('hidden');
                    document.getElementById('banner').classList.remove('active');
                    document.getElementById('resetBtn').style.display = 'none';
                }
            }
        });

        // Запуск по нажатию Enter
        document.getElementById('gifUrl').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') startAd();
        });

        // Авто-подгрузка при старте Майнкрафта
        window.addEventListener('load', () => {
            const savedUrl = localStorage.getItem('saved_football_ad');
            if (savedUrl) applyAd(savedUrl);
        });
    </script>
</body>
</html>
