<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Рекламный Щит (HD-Масштаб)</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100vw; height: 100vh;
            background-color: #0b0f19; overflow: hidden; font-family: 'Segoe UI', sans-serif;
        }
        .input-container {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #1e293b; padding: 25px; border-radius: 15px; border: 3px solid #3b82f6;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5); z-index: 10; width: 600px;
            box-sizing: border-box; transition: opacity 0.4s, visibility 0.4s;
        }
        .input-container.hidden { opacity: 0; visibility: hidden; }
        .input-container h3 { margin-top: 0; color: #ffffff; margin-bottom: 20px; text-align: center; }
        .row-group { display: flex; gap: 12px; width: 100%; }
        .input-container input { flex-grow: 1; padding: 12px; background: #0f172a; border: 1px solid #475569; color: white; border-radius: 6px; box-sizing: border-box; font-size: 0.95rem; }
        .input-container button { background: #3b82f6; color: white; border: none; padding: 0 20px; font-weight: bold; border-radius: 6px; cursor: pointer; white-space: nowrap; transition: background 0.2s; font-size: 0.95rem; }
        .input-container button:hover { background: #2563eb; }
        .reset-btn { position: absolute; top: 10px; right: 10px; background: rgba(239, 68, 68, 0.3); color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; z-index: 5; font-size: 0.8rem; opacity: 0; transition: opacity 0.2s; }
        body:hover .reset-btn { opacity: 1; }
        .reset-btn:hover { background: rgba(239, 68, 68, 1); }

        .ad-banner {
            width: 100%;
            height: 400%; 
            background-repeat: repeat-x;
            
            /* ИСПРАВЛЕНО: Теперь гифка гарантированно стартует с левого верхнего угла, а не размазывается из центра */
            background-position: left top;
            
            background-size: auto 25%;
            display: none;
            transform: translateY(-37.5%); 
            image-rendering: -webkit-optimize-contrast;
            image-rendering: crisp-edges;
            image-rendering: pixelated;
        }
        .ad-banner.active { display: block; }
    </style>
</head>
<body>
    <div id="setupBox" class="input-container">
        <h3>Настройка рекламного баннера</h3>
        <div class="row-group">
            <input type="text" id="gifUrl" placeholder="Вставьте URL ссылку на .gif или картинку">
            <button onclick="startAd()">Запустить везде</button>
        </div>
    </div>
    <button id="resetBtn" class="reset-btn" style="display:none;" onclick="resetAd()">⚙️ Сменить рекламу</button>
    <div id="banner" class="ad-banner"></div>
    <script>
        function applyAd(url) {
            const banner = document.getElementById('banner');
            const setupBox = document.getElementById('setupBox');
            const resetBtn = document.getElementById('resetBtn');
            banner.style.backgroundImage = `url('${url}')`;
            document.getElementById('gifUrl').value = url;
            setupBox.classList.add('hidden');
            banner.classList.add('active');
            resetBtn.style.display = 'block';
        }
        function startAd() {
            const url = document.getElementById('gifUrl').value.trim();
            if (!url) return;
            applyAd(url);
            localStorage.setItem('saved_football_ad', url);
        }
        function resetAd() {
            document.getElementById('setupBox').classList.remove('hidden');
            document.getElementById('banner').classList.remove('active');
            document.getElementById('resetBtn').style.display = 'none';
            localStorage.removeItem('saved_football_ad');
        }
        window.addEventListener('storage', (e) => {
            if (e.key === 'saved_football_ad') {
                if (e.newValue) { applyAd(e.newValue); } 
                else { document.getElementById('setupBox').classList.remove('hidden'); document.getElementById('banner').classList.remove('active'); document.getElementById('resetBtn').style.display = 'none'; }
            }
        });
        document.getElementById('gifUrl').addEventListener('keypress', function (e) { if (e.key === 'Enter') startAd(); });
        window.addEventListener('load', () => {
            const savedUrl = localStorage.getItem('saved_football_ad');
            if (savedUrl) applyAd(savedUrl);
        });
    </script>
</body>
</html>
